name: eaze_me
description: Eaze.me - premium cross-platform Flutter app (UI-first scaffold).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI / UX
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  animations: ^2.0.11
  pull_to_refresh_flutter3: ^2.0.2

  # State / navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.7.2

  # Supabase
  supabase_flutter: ^2.8.3

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.0
  flutter_secure_storage: ^9.2.4
  package_info_plus: ^8.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/eazeme_logo.png
  adaptive_icon_background: "#F3F0FF"
  adaptive_icon_foreground: assets/images/eazeme_logo.png
  web:
    generate: true
    image_path: assets/images/eazeme_logo.png
    background_color: "#F3F0FF"
    theme_color: "#261AF6"
  windows:
    generate: true
    image_path: assets/images/eazeme_logo.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/images/eazeme_logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Gropled
      fonts:
        - asset: assets/fonts/Gropled.ttf
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Light.ttf
          weight: 300
        - asset: assets/fonts/Satoshi-Regular.ttf
          weight: 400
        - asset: assets/fonts/Satoshi-Medium.ttf
          weight: 500
        - asset: assets/fonts/Satoshi-Bold.ttf
          weight: 700
        - asset: assets/fonts/Satoshi-Black.ttf
          weight: 900

