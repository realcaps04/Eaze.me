<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Eaze.me — trusted professionals on demand.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Eaze.me">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Eaze.me</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #F3F0FF;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    #eaze-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #F3F0FF;
      z-index: 9999;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    #eaze-splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .eaze-glow {
      position: relative;
      width: 108px;
      height: 108px;
      display: grid;
      place-items: center;
      margin-bottom: 22px;
    }

    .eaze-glow::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent,
        #FE6839,
        #261AF6,
        #6D5EF7,
        transparent
      );
      animation: eaze-spin 3.2s linear infinite;
      filter: blur(0.5px);
    }

    .eaze-logo {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      object-fit: cover;
      position: relative;
      z-index: 1;
      box-shadow: 0 12px 24px rgba(38, 26, 246, 0.22);
      animation: eaze-pulse 2.4s ease-in-out infinite;
    }

    .eaze-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #14121F;
      margin: 0 0 28px;
    }

    .eaze-bar {
      width: 180px;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(254,104,57,0.25), rgba(38,26,246,0.25));
      overflow: hidden;
      position: relative;
    }

    .eaze-bar::after {
      content: "";
      position: absolute;
      top: 0;
      left: -45%;
      width: 45%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #FE6839, #261AF6);
      box-shadow: 0 0 12px rgba(254, 104, 57, 0.45);
      animation: eaze-slide 1.4s ease-in-out infinite;
    }

    @keyframes eaze-spin {
      to { transform: rotate(360deg); }
    }

    @keyframes eaze-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    @keyframes eaze-slide {
      0% { left: -45%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div id="eaze-splash" aria-label="Loading Eaze.me">
    <div class="eaze-glow">
      <img class="eaze-logo" src="eazeme_logo.png" alt="Eaze.me logo" />
    </div>
    <p class="eaze-title">Eaze.me</p>
    <div class="eaze-bar" aria-hidden="true"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('eaze-splash');
      if (!splash) return;
      splash.classList.add('hidden');
      setTimeout(function () { splash.remove(); }, 400);
    });
  </script>
</body>
</html>
